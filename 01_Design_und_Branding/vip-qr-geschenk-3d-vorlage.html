<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pauli Best Price Thailand — VIP-Geschenk 3D</title>
  <!--
    Präsentations-Vorlage (Design only — kein App-Runtime-Code).
    QR-Master: ../05_Dokumentation/VIP_QR_Codes_Master/*.svg

    Aufruf-Beispiele:
      ?slot=56&from=Pauli&to=Max
      ?slot=55&from=Wii&to=Freundin
      ?slot=41  (Gold-Ticket)

    Druck: Browser → „Als PDF speichern“ bei 100 % Zoom.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-deep: #0c0a14;
      --bg-glow: #1a1430;
      --text-silver: #e8ecf2;
      --text-muted: #9aa3b2;
      --accent: #c7a45a;
      --card-face: linear-gradient(145deg, #1f1a2e 0%, #12101c 48%, #0a0812 100%);
      --ribbon: linear-gradient(90deg, #6e4cff, #9b7bff, #6e4cff);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: radial-gradient(ellipse 120% 80% at 50% 0%, var(--bg-glow), var(--bg-deep) 62%);
      color: var(--text-silver);
      font-family: "Noto Sans Thai", system-ui, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(1.25rem, env(safe-area-inset-top)) 1rem 2.5rem;
      gap: 1.5rem;
    }

    .brand {
      text-align: center;
      letter-spacing: 0.12em;
    }

    .brand-line1 {
      font-family: Cinzel, Georgia, serif;
      font-size: clamp(1.1rem, 4vw, 1.65rem);
      font-weight: 600;
      color: #f3e6c8;
      text-transform: uppercase;
    }

    .brand-line2 {
      font-family: Cinzel, Georgia, serif;
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      color: var(--text-muted);
      margin-top: 0.35rem;
      letter-spacing: 0.28em;
    }

    .gift-caption {
      text-align: center;
      max-width: 28rem;
      line-height: 1.55;
      font-size: clamp(0.9rem, 2.8vw, 1.05rem);
      color: var(--text-muted);
    }

    .gift-caption strong {
      color: #fff;
      font-weight: 600;
    }

    /* 3D-Bühne */
    .gift-stage {
      perspective: 1400px;
      perspective-origin: 50% 42%;
      width: min(92vw, 420px);
      aspect-ratio: 0.78;
      position: relative;
    }

    .gift-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(14deg) rotateY(-8deg);
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      animation: gift-float 5s ease-in-out infinite;
    }

    .gift-stage:hover .gift-card,
    .gift-stage:focus-within .gift-card {
      transform: rotateX(6deg) rotateY(4deg) translateY(-6px);
    }

    @keyframes gift-float {
      0%, 100% { transform: rotateX(14deg) rotateY(-8deg) translateY(0); }
      50% { transform: rotateX(12deg) rotateY(-5deg) translateY(-10px); }
    }

    .card-shadow {
      position: absolute;
      inset: auto 8% -6% 8%;
      height: 18%;
      background: radial-gradient(ellipse, rgba(0,0,0,0.55), transparent 70%);
      transform: rotateX(90deg) translateZ(-40px);
      filter: blur(8px);
      pointer-events: none;
    }

    .card-body {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: var(--card-face);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 28px 60px rgba(0,0,0,0.55),
        0 2px 0 rgba(255,255,255,0.06) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.1rem 1rem 1.25rem;
      transform: translateZ(24px);
    }

    .card-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg, rgba(255,255,255,0.07) 0%, transparent 42%, rgba(255,255,255,0.03) 100%);
      pointer-events: none;
    }

    .role-badge {
      position: relative;
      z-index: 1;
      font-family: Cinzel, Georgia, serif;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid currentColor;
      margin-bottom: 0.75rem;
      opacity: 0.95;
    }

    .qr-frame {
      position: relative;
      z-index: 1;
      width: min(72vw, 290px);
      aspect-ratio: 1;
      border-radius: 16px;
      padding: 0.45rem;
      background: linear-gradient(145deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
      box-shadow:
        0 12px 32px rgba(0,0,0,0.45),
        0 0 0 1px rgba(255,255,255,0.1) inset;
      transform: translateZ(18px);
    }

    .qr-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
    }

    .card-meta {
      position: relative;
      z-index: 1;
      margin-top: 0.85rem;
      text-align: center;
      width: 100%;
    }

    .card-slot {
      font-family: Cinzel, Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .card-code {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      letter-spacing: 0.06em;
      word-break: break-all;
    }

    /* Schleife / Wertgegenstand-Akzent */
    .ribbon {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%) translateZ(36px);
      width: 58%;
      height: 14px;
      border-radius: 0 0 8px 8px;
      background: var(--ribbon);
      box-shadow: 0 6px 18px rgba(110,76,255,0.35);
    }

    .seal {
      position: absolute;
      bottom: 1.1rem;
      right: 1rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff9e6, #d4af37 45%, #6e5410);
      border: 2px solid rgba(255,255,255,0.35);
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      display: grid;
      place-items: center;
      font-family: Cinzel, Georgia, serif;
      font-size: 0.62rem;
      font-weight: 700;
      color: #3d2e0a;
      letter-spacing: 0.05em;
      transform: translateZ(30px) rotate(-12deg);
    }

    .edge-left, .edge-right {
      position: absolute;
      top: 8%;
      bottom: 8%;
      width: 10px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(0,0,0,0.35));
      opacity: 0.5;
      pointer-events: none;
    }

    .edge-left { left: -3px; transform: rotateY(90deg) translateZ(8px); }
    .edge-right { right: -3px; transform: rotateY(-90deg) translateZ(8px); }

    .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      max-width: 24rem;
      line-height: 1.45;
    }

    /* Rollen-Farben */
    .role-friends_core { --accent: #cd7f32; --ribbon: linear-gradient(90deg, #8e5a20, #d49a4e, #8e5a20); }
    .role-influencer { --accent: #a8adb4; --ribbon: linear-gradient(90deg, #5c636a, #d8dde3, #5c636a); }
    .role-vip_influencer { --accent: #c7a45a; --ribbon: linear-gradient(90deg, #7b5b1d, #f0d78c, #7b5b1d); }
    .role-family_special { --accent: #3bb25a; --ribbon: linear-gradient(90deg, #1d6f31, #6fe08a, #1d6f31); }
    .role-owners { --accent: #9b7bff; --ribbon: linear-gradient(90deg, #4d35c7, #b39cff, #4d35c7); }

    @media (max-width: 480px) {
      .gift-stage { width: min(94vw, 360px); }
      .qr-frame { width: min(78vw, 260px); }
      .seal { width: 44px; height: 44px; font-size: 0.55rem; }
      .gift-card { animation: none; transform: rotateX(10deg) rotateY(-4deg); }
    }

    @media print {
      body { background: #fff; color: #111; }
      .gift-card { animation: none; transform: none; }
      .hint { display: none; }
    }
  </style>
</head>
