# Render.com — PAULI BEST PRICE API + statische App
# Secrets (ELEVENLABS, OPENAI) im Render-Dashboard setzen: sync: false
#
# BLUEPRINT PFLICHT für generateValue (OSG_INSTALL_FP_SALT):
#   Services nur per API angelegt erben render.yaml NICHT automatisch.
#   Einmalig: Dashboard → Blueprints → New Instance → dieses Repo + render.yaml
#   Sonst: GitHub auto-deploy kann vor gesetztem OSG_INSTALL_FP_SALT starten → exit 1.
#   Preflight: npm run render:verify-env
#   Siehe: docs/OSG-INFRASTRUCTURE-HARDENING.md

services:
  - type: web
    name: pauli-best-price-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --omit=dev
    startCommand: node 02_Quellcode/Core_Logik/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # --- Pflichtvariablen (siehe .env.template / deploy-check.sh) ---
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: OSG_CORS_ORIGINS
        value: https://omnisolutionsglobal.com,https://www.omnisolutionsglobal.com,https://pauli-best-price-api.onrender.com,https://pauli-best-price-api-nzbl.onrender.com
      - key: OSG_API_ALLOWED_ORIGINS
        value: https://omnisolutionsglobal.com,https://www.omnisolutionsglobal.com,https://pauli-best-price-api.onrender.com,https://pauli-best-price-api-nzbl.onrender.com
      - key: OSG_INSTALL_FP_SALT
        generateValue: true
      # --- Betrieb / Hosting ---
      - key: DISABLE_HTTPS
        value: "1"
      - key: OSG_PUBLIC_ORIGIN
        value: https://omnisolutionsglobal.com
      - key: OSG_API_PUBLIC_ORIGIN
        value: https://api.omnisolutionsglobal.com
      # --- ElevenLabs: Pauli-Stimme = dein Stimmklon (Vorlage), nicht vorgefertigte Stimme ---
      # Voice-ID im Render-Dashboard setzen: ElevenLabs → Voices → dein Pauli-Klon → Copy ID
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: ELEVENLABS_VOICE_NAME_HINT
        value: Liam
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_VISION_MODEL
        value: gpt-4o-mini
      - key: OSG_RL_TTS_MAX
        value: "50"
      - key: OSG_RL_STT_MAX
        value: "60"
      - key: OSG_RL_CLIP_MAX
        value: "30"
      - key: OSG_RL_PRICES_MAX
        value: "180"
      - key: OSG_AI_DAILY_MAX
        value: "220"
      - key: OSG_SUPPORT_EMAIL
        value: support@omnisolutionsglobal.com
      - key: OSG_SUPPORT_TICKET_START
        value: "10001"
      - key: OSG_INFO_EMAIL
        value: info@omnisolutionsglobal.com
      # SMTP/IMAP — im Dashboard setzen (sync: false)
      - key: OSG_SMTP_HOST
        sync: false
      - key: OSG_SMTP_PORT
        value: "587"
      - key: OSG_SMTP_USER
        sync: false
      - key: OSG_SMTP_PASS
        sync: false
      - key: OSG_SMTP_FROM
        sync: false
      - key: OSG_IMAP_HOST
        sync: false
      - key: OSG_IMAP_PORT
        value: "993"
      - key: OSG_RL_ECHO_PROTOCOL_MAX
        value: "120"
      - key: INVOLVE_ASIA_AFFILIATE_ID
        value: "1085689"
      - key: OSG_AFFILIATE_PUBLISHER
        value: Omni Solutions Global
      - key: INVOLVE_ASIA_API_KEY
        sync: false
      - key: INVOLVE_ASIA_API_SECRET
        sync: false
      - key: INVOLVE_ASIA_OFFER_LOTUS_TH
        value: "4760"
      - key: OSG_RL_SUPPORT_TICKET_MAX
        value: "24"
